# Two iCommands clients for parallel access testing.
# One mounts the host filesystem; the other is isolated.

zone_name: tempZone
admin_password: password

database:
  hostname: icat

provider:
  hostname: ies
  resources:
    - name: demoResc
      type: unixfilesystem
      path: /var/lib/irods/Vault

consumers: []

clients:
  - hostname: icom
    mount: "."
  - hostname: worker
